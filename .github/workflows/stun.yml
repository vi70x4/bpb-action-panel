name: NAT STUN Test

on:
  workflow_dispatch:

jobs:
  stun-test:
    runs-on: ubuntu-latest
    steps:
      - name: Test NAT with stun-client
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq stun-client
          echo "=== STUN Google ==="
          stun stun.l.google.com:19302 || true
          echo "=== STUN 3cx ==="
          stun stun.3cx.com:3478 || true
          echo "=== STUN ekiga ==="
          stun stun.ekiga.net:3478 || true
