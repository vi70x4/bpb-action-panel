name: BPB Action Panel

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy
          - build
          - test
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at midnight UTC
    - cron: "0 0 * * *"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Lint code
        run: npm run lint || true

      - name: Dead code detection
        run: npm run dead-code || true

      - name: Run tests
        run: npm test || true

      - name: Build TypeScript
        run: npm run build

      - name: Build panel assets
        run: npm run build:panel

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: panel-build
          path: |
            dist/
            !node_modules/

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event.inputs.action == 'deploy'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: panel-build
          path: dist/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
        continue-on-error: true

  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    if: needs.deploy.result == 'success'

    steps:
      - name: Check service health
        run: |
          echo "Performing health check..."
          # Add actual health check here
          echo "Health check complete"

  release:
    needs: [build-and-test, deploy]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: panel-build
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/***
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## BPB Action Panel Release v${{ github.run_number }}

            This release was auto-generated by GitHub Actions.

            ### Changes:
            - Auto-generated release from commit ${{ github.sha }}

            ### Downloads:
            - [panel.html](dist/panel.html)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
