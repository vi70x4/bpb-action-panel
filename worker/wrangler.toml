name = "bpb-action-coordinator"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# KV namespace for proxy configs.
# Create with: wrangler kv:namespace create "BPB_KV"
# Then paste the id below and the preview_id for dev.
# If not configured, worker falls back to in-memory storage (resets on redeploy).
[[kv_namespaces]]
binding = "BPB_KV"
id = "93a55a4206a54fb4aa185533fee2dd39"
# preview_id = "paste-your-preview-id-here"

# Smart Placement — disabled for now due to wrangler deploy hang
# Re-enable after: https://github.com/cloudflare/workers-sdk/issues
#[placement]
#mode = "smart"

# Secrets (set with: wrangler secret put AUTH_TOKEN)
# AUTH_TOKEN = shared secret for runner registration

# n2n P2P overlay config — ⚠️ OVERRIDE BEFORE DEPLOY ⚠️
# The wizard (meshify-wizard.sh) generates unique community/key per deployment.
# If deploying manually, generate unique values:
#   openssl rand -hex 8   → community
#   openssl rand -base64 16  → key
# These static placeholders are for dev/testing only.
[vars]
N2N_COMMUNITY = "replace-me-with-generated-community"
N2N_KEY = "replace-me-with-generated-key"
N2N_SUPERNODE = "supernode.ntop.org:7777"
